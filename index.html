<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lullaby — Bedtime Playlists</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0b0e1a;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.07);
      --accent: #7b8cde;
      --accent-glow: rgba(123, 140, 222, 0.25);
      --accent-soft: #a4b0f0;
      --text-primary: #e8eaf6;
      --text-secondary: #8a8faa;
      --text-muted: #555a72;
      --surface: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.06);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Ambient Background */
    .ambient-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .ambient-bg .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      animation: orbFloat 20s ease-in-out infinite alternate;
    }
    .ambient-bg .orb:nth-child(1) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #3a2d7c, transparent);
      top: -10%; left: -5%;
      animation-duration: 25s;
    }
    .ambient-bg .orb:nth-child(2) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #1e3a5f, transparent);
      bottom: -15%; right: -5%;
      animation-duration: 30s;
      animation-delay: -5s;
    }
    .ambient-bg .orb:nth-child(3) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #2d1b4e, transparent);
      top: 40%; left: 50%;
      animation-duration: 22s;
      animation-delay: -10s;
    }
    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.1); }
      100% { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      0% { opacity: 0.1; transform: scale(0.8); }
      100% { opacity: var(--max-opacity); transform: scale(1.2); }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    header {
      padding: 48px 0 24px;
      text-align: center;
      animation: fadeUp 0.8s ease-out;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), #5a6abf);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-primary);
    }
    header p {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 300;
      max-width: 420px;
      margin: 0 auto;
    }

    /* Mood Selector */
    .mood-section {
      margin: 40px 0 32px;
      animation: fadeUp 0.8s ease-out 0.1s both;
    }
    .section-label {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 16px;
      color: var(--text-primary);
    }
    .mood-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .mood-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 400;
      cursor: pointer;
      transition: var(--transition);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .mood-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }
    .mood-btn.active {
      background: linear-gradient(135deg, rgba(123,140,222,0.2), rgba(123,140,222,0.08));
      border-color: var(--accent);
      color: var(--accent-soft);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .mood-btn .mood-emoji { font-size: 1.1rem; }

    /* Sleep Timer */
    .timer-section {
      margin-bottom: 36px;
      animation: fadeUp 0.8s ease-out 0.2s both;
    }
    .timer-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .timer-btn {
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .timer-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }
    .timer-btn.active {
      background: rgba(123,140,222,0.15);
      border-color: var(--accent);
      color: var(--accent-soft);
    }
    .timer-display {
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .timer-display.running { color: var(--accent-soft); }

    /* Playlist Grid */
    .playlists-section {
      margin-bottom: 180px;
      animation: fadeUp 0.8s ease-out 0.3s both;
    }
    .playlists-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .playlist-count {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .playlists-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .playlist-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: var(--transition);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .playlist-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(123,140,222,0.05));
      opacity: 0;
      transition: var(--transition);
    }
    .playlist-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255,255,255,0.1);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .playlist-card:hover::before { opacity: 1; }
    .playlist-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }
    .card-art {
      width: 56px; height: 56px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .card-play {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.8);
      transition: var(--transition);
      box-shadow: 0 4px 15px var(--accent-glow);
    }
    .playlist-card:hover .card-play,
    .playlist-card.active .card-play {
      opacity: 1;
      transform: scale(1);
    }
    .card-play svg { width: 14px; height: 14px; }
    .card-info { position: relative; z-index: 1; }
    .card-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .card-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.5;
      font-weight: 300;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .card-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Track List Side Panel */
    .track-panel {
      position: fixed;
      top: 0;
      right: -440px;
      width: 420px;
      height: 100vh;
      background: rgba(11, 14, 26, 0.95);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-left: 1px solid var(--border);
      z-index: 100;
      transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      padding: 32px 24px 200px;
    }
    .track-panel.open { right: 0; }
    .panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .panel-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .panel-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .panel-close:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }
    .panel-playlist-info {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .panel-art {
      width: 72px; height: 72px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      flex-shrink: 0;
    }
    .panel-details h2 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .panel-details p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 300;
    }
    .panel-play-all {
      margin-top: 10px;
      padding: 8px 20px;
      border: none;
      border-radius: 100px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .panel-play-all:hover {
      background: var(--accent-soft);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .track-list { list-style: none; }
    .track-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 2px;
    }
    .track-item:hover { background: var(--bg-card-hover); }
    .track-item.playing {
      background: rgba(123,140,222,0.1);
    }
    .track-num {
      width: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .track-item.playing .track-num { color: var(--accent); }
    .track-item.playing .track-num .num-text { display: none; }
    .track-item .eq-bars { display: none; }
    .track-item.playing .eq-bars {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 14px;
    }
    .eq-bar {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      animation: eqBounce 0.8s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
    .eq-bar:nth-child(2) { height: 10px; animation-delay: 0.2s; }
    .eq-bar:nth-child(3) { height: 4px; animation-delay: 0.4s; }
    @keyframes eqBounce {
      0% { transform: scaleY(0.4); }
      100% { transform: scaleY(1); }
    }
    .track-info { flex: 1; min-width: 0; }
    .track-title {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-item.playing .track-title { color: var(--accent-soft); }
    .track-artist {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 300;
    }
    .track-dur {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* Bottom Player */
    .player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(11, 14, 26, 0.92);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid var(--border);
      padding: 0 24px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .player-bar.visible { transform: translateY(0); }
    .player-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
      padding: 14px 0;
    }
    .player-track {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .player-art {
      width: 48px; height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .player-track-info { min-width: 0; }
    .player-track-title {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-track-artist {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 300;
    }
    .player-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .player-btns {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .ctrl-btn {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }
    .ctrl-btn:hover { color: var(--text-primary); }
    .ctrl-btn svg { width: 20px; height: 20px; }
    .ctrl-play {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff !important;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .ctrl-play:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px var(--accent-glow);
    }
    .ctrl-play svg { width: 18px; height: 18px; }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 480px;
    }
    .progress-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: center;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--surface);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .progress-bar:hover { height: 6px; }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      width: 0%;
      transition: width 0.1s linear;
    }
    .player-extra {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
    }
    .vol-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .vol-btn {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 2px;
      transition: var(--transition);
    }
    .vol-btn:hover { color: var(--text-primary); }
    .vol-btn svg { width: 18px; height: 18px; }
    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 4px;
      background: var(--surface);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeUp 0.5s ease-out both;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .playlists-grid {
        grid-template-columns: 1fr;
      }
      .player-inner {
        grid-template-columns: 1fr auto;
        gap: 12px;
      }
      .player-extra { display: none; }
      .progress-row { max-width: 300px; }
      .track-panel {
        width: 100%;
        right: -100%;
      }
      .mood-grid { gap: 8px; }
      .mood-btn { padding: 8px 14px; font-size: 0.82rem; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Shuffle/Repeat active */
    .ctrl-btn.active { color: var(--accent-soft); }
  </style>
</head>
<body>

  <!-- Ambient background -->
  <div class="ambient-bg">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="stars" id="stars"></div>

  <div class="app">
    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">&#9790;</div>
        <span class="logo-text">Lullaby</span>
      </div>
      <p>Curated bedtime playlists to ease you into a peaceful night's rest</p>
    </header>

    <!-- Mood Selection -->
    <section class="mood-section">
      <div class="section-label">How are you feeling tonight?</div>
      <div class="mood-grid" id="moodGrid"></div>
    </section>

    <!-- Sleep Timer -->
    <section class="timer-section">
      <div class="section-label">Sleep Timer</div>
      <div class="timer-row">
        <button class="timer-btn" data-minutes="15">15 min</button>
        <button class="timer-btn" data-minutes="30">30 min</button>
        <button class="timer-btn" data-minutes="45">45 min</button>
        <button class="timer-btn" data-minutes="60">1 hour</button>
        <button class="timer-btn" data-minutes="90">1.5 hr</button>
        <button class="timer-btn" data-minutes="0">Off</button>
        <span class="timer-display" id="timerDisplay"></span>
      </div>
    </section>

    <!-- Playlists -->
    <section class="playlists-section">
      <div class="playlists-header">
        <div class="section-label">Bedtime Playlists</div>
        <span class="playlist-count" id="playlistCount"></span>
      </div>
      <div class="playlists-grid" id="playlistsGrid"></div>
    </section>
  </div>

  <!-- Track List Side Panel -->
  <div class="panel-overlay" id="panelOverlay"></div>
  <div class="track-panel" id="trackPanel">
    <div class="panel-header">
      <span style="font-size:0.85rem;color:var(--text-muted);">Now Playing</span>
      <button class="panel-close" id="panelClose">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="panelContent"></div>
  </div>

  <!-- Bottom Player -->
  <div class="player-bar" id="playerBar">
    <div class="player-inner">
      <div class="player-track">
        <div class="player-art" id="playerArt"></div>
        <div class="player-track-info">
          <div class="player-track-title" id="playerTitle">--</div>
          <div class="player-track-artist" id="playerArtist">--</div>
        </div>
      </div>
      <div class="player-controls">
        <div class="player-btns">
          <button class="ctrl-btn" id="btnShuffle" title="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </button>
          <button class="ctrl-btn" id="btnPrev" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-play" id="btnPlay" title="Play">
            <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <button class="ctrl-btn" id="btnNext" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-3.5 6L4 6v12z" transform="rotate(180 12 12)"/></svg>
          </button>
          <button class="ctrl-btn" id="btnRepeat" title="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>
        <div class="progress-row">
          <span class="progress-time" id="currentTime">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-time" id="totalTime">0:00</span>
        </div>
      </div>
      <div class="player-extra">
        <div class="vol-row">
          <button class="vol-btn" id="volBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="70" />
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
